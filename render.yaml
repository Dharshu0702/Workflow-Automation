services:
  type: web
  name: workflow-backend
  runtime: node
  plan: free
  buildCommand: cd backend && npm install
  startCommand: cd backend && npm start
  envVars:
    - key: NODE_ENV
      value: production
    - key: MONGODB_URI
      value: mongodb+srv://root:root@cluster0.pbazund.mongodb.net/workflow
    - key: PORT
      value: 10000
    - key: JWT_SECRET
      value: your-super-secret-jwt-key
    - key: ALLOWED_ORIGINS
      value: https://*.vercel.app,https://vercel.app,https://localhost:3000,https://workflowautomation-7617xu3zo-suryas-projects-3a402b64.vercel.app,https://workflow-automation-1-cnj3.onrender.com
  healthCheckPath: /health
  autoDeploy: true
